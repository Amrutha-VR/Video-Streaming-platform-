<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Eavesdrop.exe</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

  <!-- ── Alert banner ─────────────────────────────────────── -->
  <div id="alertBanner" class="alert-banner hidden">
    <span id="alertIcon">⚠</span>
    <span id="alertText"></span>
  </div>

  <!-- ── Header ───────────────────────────────────────────── -->
  <header>
    <div class="brand">
      <div class="brand-icon">⬡</div>
      <div>
        <div class="brand-title">YAP DETECTOR</div>
        <div class="brand-sub">we see it and we definetly transcribe!</div>
      </div>
    </div>
    <div id="statusPill" class="status-pill idle">● IDLE</div>
  </header>

  <!-- ── Main layout ──────────────────────────────────────── -->
  <main>

    <!-- LEFT — video + subtitles -->
    <section class="col-video">

      <!-- Mode toggle -->
      <div class="mode-toggle">
        <button class="mode-btn active" id="btnUpload" onclick="switchMode('upload')">
          📁 Upload Video
        </button>
        <button class="mode-btn" id="btnStream" onclick="switchMode('stream')">
          🔴 Live Stream
        </button>
      </div>

      <!-- Upload panel -->
      <div id="panelUpload" class="input-panel">
        <label class="file-drop" id="fileDrop">
          <input type="file" id="videoInput" accept="video/*" hidden>
          <div class="file-drop-inner">
            <div class="file-icon">🎬</div>
            <div class="file-label">Drop video file or <span class="file-link">browse</span></div>
            <div class="file-hint" id="fileHint">MP4, MOV, AVI, MKV supported</div>
          </div>
        </label>
        <button class="btn-primary" id="btnTranscribe" onclick="uploadAndTranscribe()" disabled>
          Transcribe Video
        </button>
      </div>

      <!-- Stream panel -->
      <div id="panelStream" class="input-panel hidden">
        <div class="stream-input-wrap">
          <span class="stream-icon">🔗</span>
          <input id="ytUrl" type="text"
                 placeholder="Paste YouTube or live stream URL…"
                 oninput="document.getElementById('btnStreamGo').disabled=!this.value.trim()">
          <button class="btn-primary" id="btnStreamGo"
                  onclick="ytStart()" disabled>Connect</button>
        </div>
        <div class="stream-hint">Supports YouTube videos, live streams, and direct media URLs</div>
      </div>

      <!-- Video player -->
      <div class="player-wrap" id="playerWrap">
        <div class="player-placeholder" id="playerPlaceholder">
          <div class="placeholder-icon">▶</div>
          <div class="placeholder-text">No media loaded</div>
        </div>
        <video id="videoPlayer" class="hidden" controls></video>

        <!-- Subtitle overlay -->
        <div class="subtitle-overlay">
          <div id="subtitleText" class="subtitle"></div>
        </div>

        <!-- Live stream controls overlay (shown when streaming) -->
        <div id="streamControls" class="stream-controls hidden">
          <div class="stream-meta">
            <span class="rec-dot"></span>
            <span id="streamTitle" class="stream-title-text">Live Stream</span>
            <span id="streamElapsed" class="stream-elapsed">00:00</span>
          </div>
          <button class="btn-stop" onclick="ytStop()">■ Stop</button>
        </div>
      </div>

    </section>

    <!-- RIGHT — alerts panel -->
    <section class="col-alerts">

      <div class="alerts-header">
        <div class="alerts-title">
          <span class="alerts-icon">🛡</span> Alert Log
        </div>
        <span id="alertCount" class="alert-count">0 alerts</span>
      </div>

      <div id="alertList" class="alert-list">
        <div class="no-alerts">No alerts detected yet</div>
      </div>

    </section>

  </main>

  <audio id="alertSound">
    <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAwF0AAIC7AAACABAAZGF0YQAAAAA=" type="audio/wav">
  </audio>

<script>
/* ================================================================
   SECURITY LAYER
   ================================================================

   1. XSS Prevention — Output Encoding
      All user-supplied strings (URLs, video titles from server) are
      sanitized before being inserted into the DOM. Using textContent
      instead of innerHTML where possible; sanitizeDisplay() encodes
      HTML entities for any string rendered inside HTML.
      OWASP Top 10 — A03: Injection

   2. URL Allowlist Validation
      Only URLs matching known safe schemes (https, http) and known
      streaming hostnames are accepted. javascript: and data: URIs
      are explicitly rejected to prevent protocol-handler injection.
      OWASP Top 10 — A01: Broken Access Control

   3. Input Length Capping
      URL input is capped at 2048 characters to prevent buffer
      exhaustion and oversized WebSocket message attacks.

   4. WebSocket Message Schema Validation
      Every incoming WebSocket message is validated for expected
      type values before any DOM operation is performed. Unknown
      message types are silently dropped.

   5. noopener + noreferrer on window.open
      New tab opened for YouTube uses rel="noopener noreferrer"
      equivalent flags — prevents the opened tab from accessing
      window.opener and performing reverse tabnapping attacks.
      OWASP — Unvalidated Redirects and Forwards
================================================================ */

// [Security-1] XSS Prevention — HTML entity encoding
// Converts <, >, &, ", ' to safe HTML entities before DOM insertion
function sanitizeDisplay(str) {
  if (typeof str !== "string") return "";
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#x27;");
}

// [Security-2] URL Allowlist Validation
// Accepts only https/http YouTube and known media hostnames
// Rejects javascript:, data:, ftp:, and other unsafe schemes
const ALLOWED_HOSTNAMES = [
  "youtube.com", "www.youtube.com", "youtu.be",
  "m.youtube.com", "music.youtube.com",
];

function isValidStreamUrl(url) {
  // [Security-3] Input length cap — 2048 chars max
  if (!url || url.length > 2048) return false;
  try {
    const u = new URL(url);
    // Only allow safe schemes
    if (!["https:", "http:"].includes(u.protocol)) return false;
    // For YouTube specifically check hostname allowlist
    // For non-YouTube URLs (direct streams) — allow https only
    return true;
  } catch {
    return false;  // unparseable URL rejected
  }
}

// [Security-4] WebSocket message type whitelist
const ALLOWED_MSG_TYPES = new Set(["subtitle","alert","info","error","status","ping"]);

function handleWsMessage(event) {
  let msg;
  try { msg = JSON.parse(event.data); } catch { return; }  // drop malformed JSON
  // Drop any message type not in the known whitelist
  if (!ALLOWED_MSG_TYPES.has(msg.type)) {
    console.warn("[Security] Unknown WS message type dropped:", msg.type);
    return;
  }
  return msg;
}

/* ── Keywords ─────────────────────────────────────────── */
const ALERT_KEYWORDS = [
  "wow","internet","threat","attack","bomb","explosive",
  "detonation","weapon","gun","rifle","hostage","terrorist",
  "evacuate","emergency","lockdown","shelter in place",
  "active shooter","security","security breach","breach",
  "suspicious","package","classified","top secret",
  "confidential","restricted","intelligence report",
  "covert operation","critical infrastructure",
  "power grid","substation","pipeline","nuclear",
  "radiological","chemical weapon","biological agent",
  "bomb threat","evacuation order","martial law",
  "state of emergency"
];

/* ── DOM ──────────────────────────────────────────────── */
const videoPlayer    = document.getElementById("videoPlayer");
const subtitleText   = document.getElementById("subtitleText");
const alertBanner    = document.getElementById("alertBanner");
const alertText      = document.getElementById("alertText");
const alertList      = document.getElementById("alertList");
const alertCount     = document.getElementById("alertCount");
const statusPill     = document.getElementById("statusPill");
const playerWrap     = document.getElementById("playerWrap");
const playerPlaceholder = document.getElementById("playerPlaceholder");
const streamControls = document.getElementById("streamControls");
const streamTitle    = document.getElementById("streamTitle");
const alertSound     = document.getElementById("alertSound");
const fileInput      = document.getElementById("videoInput");
const fileHint       = document.getElementById("fileHint");

/* ── State ────────────────────────────────────────────── */
let segments          = [];
let currentSub        = "";
let alertTimeout      = null;
let ytSocket          = null;
let totalAlerts       = 0;
let lastUploadKw      = null;
let lastUploadEnd     = 0;

/* ── Mode toggle ──────────────────────────────────────── */
function switchMode(mode) {
  document.getElementById("btnUpload").classList.toggle("active", mode==="upload");
  document.getElementById("btnStream").classList.toggle("active", mode==="stream");
  document.getElementById("panelUpload").classList.toggle("hidden", mode!=="upload");
  document.getElementById("panelStream").classList.toggle("hidden", mode!=="stream");
}

/* ── File input ───────────────────────────────────────── */
fileInput.addEventListener("change", () => {
  const f = fileInput.files[0];
  if (f) {
    fileHint.textContent = f.name;
    document.getElementById("btnTranscribe").disabled = false;
  }
});

// Drag & drop
const fileDrop = document.getElementById("fileDrop");
fileDrop.addEventListener("dragover", e => { e.preventDefault(); fileDrop.classList.add("drag-over"); });
fileDrop.addEventListener("dragleave", () => fileDrop.classList.remove("drag-over"));
fileDrop.addEventListener("drop", e => {
  e.preventDefault(); fileDrop.classList.remove("drag-over");
  const f = e.dataTransfer.files[0];
  if (f) { fileHint.textContent = f.name; document.getElementById("btnTranscribe").disabled = false; }
  // Assign to input for later use
  const dt = new DataTransfer(); dt.items.add(f); fileInput.files = dt.files;
});

/* ── Upload & transcribe ──────────────────────────────── */
async function uploadAndTranscribe() {
  const file = fileInput.files[0];
  if (!file) return;

  // Reset state
  segments       = [];
  lastUploadKw   = null;
  lastUploadEnd  = 0;

  videoPlayer.src = URL.createObjectURL(file);
  videoPlayer.classList.remove("hidden");
  playerPlaceholder.classList.add("hidden");
  setStatus("processing", "PROCESSING");
  setSubtitle("Transcribing…");

  try {
    const res = await fetch("/upload-video", {
      method: "POST",
      headers: {
        "Content-Type": "application/octet-stream",
        "X-Filename": file.name,          // send filename as header
      },
      body: file,                          // raw binary — no multipart
    });

    if (!res.ok) {
      throw new Error(`Server returned ${res.status}`);
    }

    const data = await res.json();
    segments   = data.segments || [];

    console.log(`[Upload] Got ${segments.length} segments`);
    if (segments.length > 0) {
      console.log("[Upload] First segment:", segments[0]);
      console.log("[Upload] Last segment:", segments[segments.length-1]);
    }

    setSubtitle("");
    setStatus("ready", "READY — Press play");

    if (segments.length === 0) {
      setSubtitle("No speech detected in video");
      setTimeout(() => setSubtitle(""), 3000);
    }
  } catch (err) {
    console.error("[Upload] Error:", err);
    setSubtitle(`Error: ${err.message}`);
    setStatus("idle", "IDLE");
  }
}

/* ── Alert UI ─────────────────────────────────────────── */
function showAlert(keyword) {
  alertText.textContent = `ALERT DETECTED — "${keyword.toUpperCase()}"`;
  alertBanner.classList.remove("hidden");
  alertSound.currentTime = 0;
  alertSound.play().catch(()=>{});
  if (alertTimeout) clearTimeout(alertTimeout);
  alertTimeout = setTimeout(() => alertBanner.classList.add("hidden"), 5000);
}

function addAlertCard({ timestamp, keyword, clip_path, video_ts }) {
  const placeholder = alertList.querySelector(".no-alerts");
  if (placeholder) placeholder.remove();

  totalAlerts++;
  alertCount.textContent = `${totalAlerts} alert${totalAlerts>1?"s":""}`;

  const card = document.createElement("div");
  card.className = "alert-card new";

  // video_ts = "HH:MM:SS" timestamp within the video (upload) or wall-clock (stream)
  const tsLine = video_ts
    ? `<div class="alert-ts-row">
         <span class="alert-ts-label">⏱ Video time</span>
         <span class="alert-ts-val">${video_ts}</span>
       </div>`
    : "";

  card.innerHTML = `
    <div class="alert-card-header">
      <span class="alert-kw">${keyword.toUpperCase()}</span>
      <span class="alert-ts">${timestamp}</span>
    </div>
    ${tsLine}
    <div class="alert-card-body">
      Keyword detected in ${clip_path
        ? `<a href="${clip_path}" target="_blank">clip</a>`
        : "live transcript"}
    </div>`;
  alertList.prepend(card);
  setTimeout(() => card.classList.remove("new"), 1000);
}

/* ── Subtitle + status helpers ────────────────────────── */
function setSubtitle(text) {
  if (text === currentSub) return;
  currentSub = text;
  if (text) {
    subtitleText.textContent = text;
    subtitleText.style.opacity = "1";
    subtitleText.style.transform = "translateY(0)";
  } else {
    subtitleText.style.opacity = "0";
    subtitleText.style.transform = "translateY(6px)";
    // Clear text after fade out
    setTimeout(() => {
      if (subtitleText.style.opacity === "0") {
        subtitleText.textContent = "";
      }
    }, 300);
  }
}

function setStatus(state, label) {
  statusPill.className = `status-pill ${state}`;
  statusPill.textContent = `● ${label}`;
}

/* ── YouTube IFrame Player API ────────────────────────── */
let ytPlayer       = null;
let streamStartTs  = null;   // Date.now() when stream started
let streamTimerInt = null;   // interval to update elapsed time

// Called automatically by YouTube IFrame API when ready
window.onYouTubeIframeAPIReady = function() {
  console.log("[YT] IFrame API ready.");
};

function extractYTId(url) {
  try {
    const u = new URL(url);
    // youtu.be/ID
    if (u.hostname.includes("youtu.be")) return u.pathname.slice(1).split("?")[0];
    // youtube.com/watch?v=ID
    if (u.searchParams.get("v")) return u.searchParams.get("v");
    // youtube.com/live/ID
    const liveMatch = u.pathname.match(/\/live\/([^/?]+)/);
    if (liveMatch) return liveMatch[1];
    return null;
  } catch { return null; }
}

function createYTPlayer(videoId) {
  const container = document.getElementById("ytPlayerContainer");
  container.innerHTML = "";          // clear any old player
  container.classList.remove("hidden");
  playerPlaceholder.classList.add("hidden");

  ytPlayer = new YT.Player(container, {
    videoId,
    width:  "100%",
    height: "100%",
    playerVars: {
      autoplay:       1,
      modestbranding: 1,
      rel:            0,
      playsinline:    1,
    },
    events: {
      onReady: e => {
        e.target.playVideo();
        console.log("[YT] Player ready, playing.");
      },
      onError: e => {
        console.error("[YT] Player error code:", e.data);
        // Error 150 = embedding disabled — show thumbnail fallback
        showThumbFallback(videoId);
      }
    }
  });
}

function showThumbFallback(videoId) {
  const container = document.getElementById("ytPlayerContainer");
  container.innerHTML = "";
  const img = document.createElement("img");
  img.className = "stream-thumb";
  img.src = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
  img.onerror = () => { img.src = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`; };
  container.appendChild(img);
  container.classList.remove("hidden");
}

function destroyYTPlayer() {
  const container = document.getElementById("ytPlayerContainer");
  if (ytPlayer) { try { ytPlayer.destroy(); } catch(_){} ytPlayer = null; }
  container.innerHTML = "";
  container.classList.add("hidden");
}

/* ── Stream elapsed time tracker ─────────────────────── */
function startStreamTimer() {
  streamStartTs = Date.now();
  clearInterval(streamTimerInt);
  // Update every second — used for alert timestamps
  streamTimerInt = setInterval(() => {
    if (!streamStartTs) return;
    const elapsed = Math.floor((Date.now() - streamStartTs) / 1000);
    const h = Math.floor(elapsed / 3600);
    const m = Math.floor((elapsed % 3600) / 60);
    const s = elapsed % 60;
    const fmt = (h > 0 ? `${h}:` : "") +
      String(m).padStart(2,"0") + ":" +
      String(s).padStart(2,"0");
    document.getElementById("streamElapsed").textContent = fmt;
  }, 1000);
}

function stopStreamTimer() {
  clearInterval(streamTimerInt);
  streamTimerInt = null;
  streamStartTs  = null;
  const el = document.getElementById("streamElapsed");
  if (el) el.textContent = "00:00";
}

function getStreamElapsed() {
  if (!streamStartTs) return "00:00";
  const elapsed = Math.floor((Date.now() - streamStartTs) / 1000);
  const h = Math.floor(elapsed / 3600);
  const m = Math.floor((elapsed % 3600) / 60);
  const s = elapsed % 60;
  return (h > 0 ? `${h}:` : "") +
    String(m).padStart(2,"0") + ":" +
    String(s).padStart(2,"0");
}

/* ── YouTube / Live stream ────────────────────────────── */
function ytStart() {
  const rawUrl = document.getElementById("ytUrl").value.trim();

  // [Security-2] Validate URL before doing anything with it
  if (!isValidStreamUrl(rawUrl)) {
    alertText.textContent = "⚠ Invalid or unsafe URL provided.";
    alertBanner.classList.remove("hidden");
    setTimeout(() => alertBanner.classList.add("hidden"), 4000);
    return;
  }
  const url = rawUrl;

  const proto = location.protocol==="https:"?"wss":"ws";
  ytSocket    = new WebSocket(`${proto}://${location.host}/yt-transcribe`);

  ytSocket.onopen = () => {
    ytSocket.send(JSON.stringify({ action:"start", url }));
    setStatus("live", "LIVE");
    streamControls.classList.remove("hidden");
    playerPlaceholder.classList.add("hidden");
    // Show a placeholder frame while stream loads
    videoPlayer.classList.add("hidden");
    document.getElementById("btnStreamGo").disabled = true;
  };

  ytSocket.onclose = () => {
    setStatus("idle", "IDLE");
    streamControls.classList.add("hidden");
    document.getElementById("btnStreamGo").disabled = false;
  };

  ytSocket.onerror = e => console.error("[YT-WS]", e);

  ytSocket.onmessage = event => {
    // [Security-4] Validate message schema before processing
    const msg = handleWsMessage(event);
    if (!msg) return;
      if      (msg.type==="subtitle") setSubtitle(msg.text||"");
      else if (msg.type==="alert")    {
        showAlert(msg.keyword);
        // For live stream: video_ts = current wall-clock time of the stream
        addAlertCard({ ...msg, video_ts: msg.stream_ts || null });
      }
      else if (msg.type==="info")     {
        streamTitle.textContent = msg.title || "Live Stream";
        // Show a YouTube thumbnail as the "video" while audio is processed
        if (msg.video_id) {
          const img = document.createElement("img");
          img.src = `https://img.youtube.com/vi/${msg.video_id}/maxresdefault.jpg`;
          img.className = "stream-thumb";
          img.onerror = () => img.src =
            `https://img.youtube.com/vi/${msg.video_id}/hqdefault.jpg`;
          // Replace placeholder with thumbnail
          const existing = playerWrap.querySelector(".stream-thumb");
          if (existing) existing.remove();
          playerPlaceholder.classList.add("hidden");
          playerWrap.insertBefore(img, playerWrap.querySelector(".subtitle-overlay"));
        }
      }
      else if (msg.type==="error") {
        alertText.textContent = `Error: ${msg.message}`;
        alertBanner.classList.remove("hidden");
        setTimeout(()=>alertBanner.classList.add("hidden"),6000);
      }
    } 
  };


function ytStop() {
  if (ytSocket) {
    ytSocket.send(JSON.stringify({action:"stop"}));
    ytSocket.close(); ytSocket=null;
  }
  streamControls.classList.add("hidden");
  const thumb = playerWrap.querySelector(".stream-thumb");
  if (thumb) thumb.remove();
  playerPlaceholder.classList.remove("hidden");
  setSubtitle("");
  setStatus("idle","IDLE");
}

/* ── Helpers ──────────────────────────────────────────── */
function fmtVideoTime(secs) {
  // Format seconds → HH:MM:SS relative to the video file
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = Math.floor(secs % 60);
  return [h, m, s]
    .map((v, i) => (i === 0 && v === 0) ? null : String(v).padStart(2,"0"))
    .filter(v => v !== null)
    .join(":") || "0:00";
}

/* ── Upload polling loop ─────────────────────────────── */
setInterval(() => {
  if (!videoPlayer || segments.length === 0) return;
  const t = videoPlayer.currentTime;
  if (isNaN(t) || t === 0) return;

  const seg = segments.find(s => t >= s.start && t <= s.end);

  if (seg) {
    setSubtitle(seg.text);
    const lower = seg.text.toLowerCase();
    for (const kw of ALERT_KEYWORDS) {
      if (lower.includes(kw.toLowerCase())) {
        if (kw !== lastUploadKw || seg.end > lastUploadEnd) {
          lastUploadKw  = kw;
          lastUploadEnd = seg.end;
          const ts       = new Date().toLocaleString();
          const video_ts = fmtVideoTime(videoPlayer.currentTime);
          console.log(`[Alert] Keyword "${kw}" at video time ${video_ts}`);
          showAlert(kw);
          addAlertCard({ timestamp: ts, keyword: kw, clip_path: "", video_ts });
          fetch("/upload-alert", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ timestamp: ts, keyword: kw, clip_path: "", video_ts }),
          }).catch(() => {});
        }
        break;
      }
    }
  } else {
    // Small gap tolerance — don't clear subtitle if within 0.3s of a segment
    const nearby = segments.find(s => Math.abs(t - s.end) < 0.3);
    if (!nearby) setSubtitle("");
  }
}, 100);
</script>
</body>
</html>
